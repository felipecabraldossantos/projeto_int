{% load static %}

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<div class="login-box">

    <h2>Login</h2>

    <form method="POST">

        {% csrf_token %}

        <input
            type="text"
            name="username"
            placeholder="Usuário"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Senha"
            required
        >

        <input type="submit" value="Entrar">

    </form>

    <a href="{% url 'home' %}">
        Entrar sem cadastro
    </a>

    <br><br>

    <a href="{% url 'cadastro' %}">
        Ainda não possui cadastro?
    </a>

</div>

</body>
</html>
