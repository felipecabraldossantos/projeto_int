{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Marketplace</title>
        <link rel="stylesheet" href="{% static 'css/style_login.css' %}">
    </head>
    <body>
    <div class="overlay">
        <div class="login-card">
            <div class="logo">

                <h1>Marketplace</h1>

                <p>Colecionáveis e muito mais.</p>

            </div>
            <form method="POST">
                {% csrf_token %}
                <input
                    type="text"
                    name="username"
                    placeholder="Usuário"
                    required
                >
                <input
                    type="password"
                    name="password"
                    placeholder="Senha"
                    required
                >
                <button type="submit">
                    Entrar
                </button>

            </form>
            <div class="links">

                <a href="{% url 'home' %}">
                    Entrar sem cadastro
                </a>

                <a href="{% url 'cadastro' %}">
                    Criar uma conta
                </a>
            </div>
        </div>
    </div>
    </body>
</html>
