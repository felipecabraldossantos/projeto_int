{% load static %}

<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Publicar Anúncio</title>
        <link rel="stylesheet" href="{% static 'css/style_cadastro_anuncio.css' %}">
    </head>
    <body>
        <div class="overlay">

            <div class="cadastro-card">

                <div class="logo">

                    <h1>Publicar Anúncio</h1>

                    <p>Escolha um item do seu inventário e coloque-o à venda.</p>

                </div>

                <form method="POST">

                    {% csrf_token %}

                    <label>Produto</label>

                    <select name="produto">

                        {% for produto in produtos %}

                            <option value="{{ produto.id }}">
                                {{ produto.nome_produto }}
                            </option>

                        {% endfor %}

                    </select>

                    <label>Preço</label>

                    <input
                        type="number"
                        step="0.01"
                        name="preco"
                        placeholder="0,00"
                        required
                    >

                    <label>Descrição do anúncio</label>

                    <textarea
                        name="descricao"
                        rows="6"
                        placeholder="Descreva o estado do produto, observações, defeitos, acessórios, etc."
                    ></textarea>

                    <button type="submit">

                        📢 Publicar anúncio

                    </button>

                </form>

                <div class="links">

                    <a href="{% url 'perfil' %}">

                        ← Voltar ao Perfil

                    </a>

                </div>

            </div>

        </div>
    </body>
</html>
